<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Financeiro · Hendril 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F2EC;--bg2:#EDEAE3;--bg3:#E0DDD5;
  --branco:#FFFFFF;--preto:#0A0A0A;--preto2:#1A1A1A;
  --dourado:#C9A84C;--dourado2:#9A7A2E;--dourado3:#F0DFA0;
  --vermelho:#C8102E;--cinza:#888878;--cinza2:#555548;--cinza3:#333328;
  --verde:#1D7A5A;--verde2:#25A374;--laranja:#C8501A;--azul:#2A6BAD;
  --borda:rgba(0,0,0,.09);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--preto2);min-height:100vh;padding:28px 16px 60px;}
.container{max-width:820px;margin:0 auto;}
.header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:28px;padding-bottom:18px;border-bottom:3px solid var(--dourado);}
.header-left h1{font-family:'Bebas Neue',sans-serif;font-size:44px;letter-spacing:5px;color:var(--preto);line-height:1;}
.header-left p{font-size:10px;letter-spacing:3px;color:var(--cinza);text-transform:uppercase;margin-top:5px;}
.header-right{display:flex;gap:6px;align-items:center;}
.btn{font-family:'DM Sans',sans-serif;font-size:11px;padding:7px 14px;border-radius:6px;border:1px solid var(--borda);cursor:pointer;background:var(--branco);color:var(--cinza2);transition:all .15s;letter-spacing:.5px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.btn:hover{background:var(--bg2);color:var(--preto);border-color:rgba(201,168,76,.4);}
.btn-gold{background:var(--dourado);border-color:var(--dourado2);color:var(--preto);font-weight:600;}
.btn-gold:hover{background:var(--dourado2);color:var(--branco);}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px;}
.kpi{background:var(--branco);border-radius:8px;padding:14px 16px;border:1px solid var(--borda);position:relative;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--dourado);}
.kpi-label{font-size:10px;color:var(--cinza);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.kpi-val{font-family:'DM Mono',monospace;font-size:17px;font-weight:500;color:var(--preto);}
.kpi-val.pos{color:var(--verde);}
.kpi-val.neg{color:var(--laranja);}
.kpi-val.gold{color:var(--dourado2);}
.mtabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
.mtab{font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid var(--borda);cursor:pointer;background:var(--branco);color:var(--cinza);font-family:'DM Sans',sans-serif;transition:all .15s;letter-spacing:.5px;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.mtab:hover{border-color:var(--dourado);color:var(--dourado2);}
.mtab.on{background:var(--preto);color:var(--dourado);border-color:var(--preto);font-weight:600;}
.mtab-add{border-style:dashed;background:transparent;}
.mtab-add:hover{border-color:var(--dourado);color:var(--dourado2);background:transparent;}
.card{background:var(--branco);border:1px solid var(--borda);border-radius:12px;padding:18px;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,.05);}
.card-title{font-size:12px;font-weight:600;color:var(--preto);margin-bottom:14px;letter-spacing:.5px;display:flex;align-items:center;justify-content:space-between;text-transform:uppercase;}
.card-title span{color:var(--cinza);font-size:10px;font-weight:400;text-transform:none;}
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
.entrada-wrap{display:flex;align-items:center;gap:8px;}
.entrada-wrap label{font-size:11px;color:var(--cinza);white-space:nowrap;letter-spacing:.5px;text-transform:uppercase;}
.entrada-wrap input{width:140px;font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:var(--verde);border:1px solid var(--borda);border-radius:6px;padding:5px 10px;background:var(--bg);box-shadow:inset 0 1px 3px rgba(0,0,0,.05);}
.entrada-wrap input:focus{outline:none;border-color:var(--dourado);}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{font-size:10px;font-weight:600;color:var(--cinza);text-align:left;padding:7px 8px;border-bottom:1px solid var(--bg3);letter-spacing:.5px;text-transform:uppercase;}
tbody tr.item-row:hover td{background:var(--bg);}
tbody tr.item-row.paid td{background:rgba(29,122,90,.05);}
tbody td{padding:3px 4px;border-bottom:1px solid var(--bg2);}
.cat-header td{padding:8px 10px;border-bottom:1px solid var(--bg3);border-top:1px solid var(--bg3);}
.cat-tag{font-size:10px;font-weight:600;letter-spacing:.06em;padding:2px 10px;border-radius:99px;display:inline-block;text-transform:uppercase;}
select.cat-sel{font-size:11px;border:1px solid transparent;background:transparent;color:var(--cinza);padding:4px 2px;border-radius:4px;font-family:'DM Sans',sans-serif;width:100%;}
select.cat-sel:focus{border-color:var(--borda);outline:none;background:var(--bg);}
select.cat-sel option{background:var(--branco);color:var(--preto);}
input.nome{width:100%;border:1px solid transparent;background:transparent;font-size:13px;padding:5px 6px;border-radius:4px;color:var(--preto2);font-family:'DM Sans',sans-serif;}
input.nome:focus{border-color:var(--borda);outline:none;background:var(--bg);}
input.val{width:100%;border:1px solid transparent;background:transparent;font-size:12px;padding:5px 6px;border-radius:4px;color:var(--preto2);font-family:'DM Mono',monospace;text-align:right;}
input.val:focus{border-color:var(--borda);outline:none;background:var(--bg);}
input.parc{width:48px;border:1px solid transparent;background:transparent;font-size:11px;padding:4px 4px;border-radius:4px;color:var(--dourado2);font-family:'DM Mono',monospace;text-align:center;font-weight:600;}
input.parc:focus{border-color:rgba(201,168,76,.4);outline:none;background:var(--bg);}
input.parc::placeholder{color:rgba(154,122,46,.25);}
.paid-btn{background:none;border:1px solid var(--borda);cursor:pointer;font-size:10px;padding:3px 8px;border-radius:99px;white-space:nowrap;color:var(--cinza);font-family:'DM Sans',sans-serif;transition:all .15s;}
.paid-btn:hover{border-color:var(--verde);color:var(--verde);}
.paid-btn.is-paid{background:rgba(29,122,90,.08);border-color:var(--verde);color:var(--verde);font-weight:600;}
.del{background:none;border:none;cursor:pointer;color:var(--bg3);font-size:16px;line-height:1;padding:2px 5px;border-radius:3px;transition:.12s;}
.del:hover{color:var(--laranja);}
.tot-row td{font-size:12px;font-weight:500;padding:10px 8px;color:var(--cinza);border-top:1px solid var(--bg3);background:var(--bg);}
.new-row td{padding:5px 4px;background:rgba(29,122,90,.04);border-bottom:1px solid var(--bg2);}
.pix-cell{display:flex;align-items:center;gap:3px;}
input.pix-inline{flex:1;min-width:0;border:1px solid transparent;background:transparent;font-size:10px;padding:4px 5px;border-radius:4px;color:var(--cinza);font-family:'DM Mono',monospace;}
input.pix-inline:focus{border-color:rgba(201,168,76,.4);outline:none;background:var(--bg);color:var(--preto);}
input.pix-inline::placeholder{color:var(--bg3);}
.pix-copy-btn{background:none;border:none;cursor:pointer;font-size:13px;padding:2px 4px;border-radius:4px;color:var(--bg3);flex-shrink:0;transition:all .12s;line-height:1;}
.pix-copy-btn:hover{color:var(--dourado2);background:rgba(201,168,76,.1);}
.pix-copy-btn.ok{color:var(--dourado2);}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.bar-label{font-size:11px;color:var(--cinza2);width:130px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-track{flex:1;background:var(--bg2);border-radius:3px;height:6px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;transition:width .4s ease;}
.bar-amt{font-family:'DM Mono',monospace;font-size:10px;color:var(--cinza);width:110px;text-align:right;flex-shrink:0;}
.chart-wrap{position:relative;height:160px;margin-bottom:8px;}
canvas#chart{width:100%;height:100%;}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:14px;font-size:11px;color:var(--cinza);}
.legend span{display:flex;align-items:center;gap:5px;}
.ldot{width:9px;height:9px;border-radius:2px;display:inline-block;flex-shrink:0;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:100;}
.modal{background:var(--branco);border:1px solid var(--borda);border-radius:12px;padding:22px;width:320px;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,.12);}
.modal h3{font-size:14px;font-weight:600;margin-bottom:4px;color:var(--preto);}
.modal-hint{font-size:11px;color:var(--cinza);margin-bottom:14px;}
.cat-list{margin-bottom:10px;}
.cat-item{display:flex;align-items:center;gap:8px;margin-bottom:7px;border-radius:6px;padding:2px 0;}
.cat-item.drag-over{background:var(--bg);}
.cat-item.dragging{opacity:.4;}
.drag-handle{cursor:grab;color:var(--cinza);font-size:14px;padding:4px 2px;user-select:none;flex-shrink:0;}
.drag-handle:active{cursor:grabbing;}
.cat-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.cat-item input{flex:1;font-size:13px;padding:5px 8px;border:1px solid var(--borda);border-radius:6px;background:var(--bg);color:var(--preto);font-family:'DM Sans',sans-serif;}
.cat-item input:focus{border-color:var(--dourado);outline:none;}
.move-btns{display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.move-btn{background:none;border:1px solid var(--borda);cursor:pointer;font-size:10px;padding:1px 5px;border-radius:3px;color:var(--cinza);line-height:1.4;font-family:'DM Sans',sans-serif;}
.move-btn:hover{background:var(--bg2);color:var(--preto);}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:8px;}
.btn-add-cat{font-size:11px;padding:7px 10px;border-radius:6px;border:1px dashed var(--borda);cursor:pointer;background:transparent;color:var(--cinza);font-family:'DM Sans',sans-serif;width:100%;margin-bottom:10px;text-align:left;}
.btn-add-cat:hover{background:var(--bg);border-color:var(--dourado);color:var(--dourado2);}
.sec-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--cinza);margin:0 0 10px;display:flex;align-items:center;gap:8px;}
.sec-label::after{content:'';flex:1;height:1px;background:var(--bg3);}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <h1>HENDRIL</h1>
      <p>Autorizado Pleno · Ademicon · Financeiro 2026</p>
    </div>
    <div class="header-right">
      <button class="btn btn-gold" onclick="exportHTML()">↓ Salvar</button>
      <button class="btn" onclick="openCatModal()">⚙ Categorias</button>
    </div>
  </div>
  <p class="sec-label" id="kpiLabel">Resumo</p>
  <div class="kpi-grid" id="kpiGrid"></div>
  <div class="card">
    <p class="card-title">Entradas vs Saídas <span id="chartSub"></span></p>
    <div class="legend">
      <span><span class="ldot" style="background:var(--verde)"></span>Entradas</span>
      <span><span class="ldot" style="background:var(--laranja)"></span>Saídas</span>
      <span><span class="ldot" style="background:var(--dourado)"></span>Saldo</span>
    </div>
    <div class="chart-wrap"><canvas id="chart"></canvas></div>
  </div>
  <div class="card">
    <div class="mtabs" id="tabs"></div>
    <div class="toolbar">
      <div class="entrada-wrap">
        <label>Entrada R$</label>
        <input id="entInput" type="number" step="0.01" value="0.00" oninput="S.entradas[mes]=parseFloat(this.value)||0;saveState();renderKPIs();renderChart();renderResumo()"/>
      </div>
      <button class="btn" onclick="addRow()">+ Despesa</button>
    </div>
    <table>
      <thead><tr>
        <th style="width:100px">Categoria</th><th>Descrição</th>
        <th style="width:110px">Chave PIX</th><th style="width:55px;text-align:center">Parc.</th>
        <th style="width:100px;text-align:right">Valor R$</th><th style="width:72px;text-align:center">Status</th><th style="width:28px"></th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="card">
    <p class="card-title">Distribuição por Categoria</p>
    <div id="resumo"></div>
  </div>
</div>
<div class="overlay" id="catModal" style="display:none">
  <div class="modal">
    <h3>Categorias</h3>
    <p class="modal-hint">Arraste para reordenar · Edite os nomes</p>
    <div class="cat-list" id="catList"></div>
    <button class="btn-add-cat" onclick="addCat()">+ Nova categoria</button>
    <div class="modal-footer"><button class="btn" onclick="closeCatModal()">Fechar</button></div>
  </div>
</div>
<input type="file" id="importFile" style="display:none" accept=".html" onchange="handleImport(event)"/>
<script>
const S={
  meses:["Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"],
  entradas:{Maio:9653.67,Junho:0,Julho:0,Agosto:0,Setembro:0,Outubro:0,Novembro:0,Dezembro:0},
  itens:{
    Maio:[{c:"Moradia",n:"Pensão",pix:"",parc:"",v:600,p:false},{c:"Telefonia",n:"Vivo",pix:"",parc:"",v:72,p:false},{c:"Equipamentos",n:"iPhone",pix:"",parc:"?",v:430,p:false},{c:"Equipamentos",n:"iPad",pix:"",parc:"?",v:196,p:false},{c:"Dívidas",n:"Empréstimo",pix:"",parc:"?",v:286,p:false},{c:"Pessoal",n:"Bruna",pix:"",parc:"",v:2038,p:false},{c:"Negócios",n:"Consultoria",pix:"",parc:"",v:200,p:false},{c:"Dívidas",n:"Cartão de Crédito",pix:"",parc:"",v:3393,p:false},{c:"Negócios",n:"Impostos PJ",pix:"",parc:"",v:347.71,p:false},{c:"Investimento",n:"Consórcio",pix:"",parc:"?",v:338,p:false},{c:"Pessoal",n:"Sandra",pix:"",parc:"",v:176.92,p:false},{c:"Negócios",n:"Aurora Motos",pix:"",parc:"?",v:82.5,p:false}],
    Junho:[{c:"Moradia",n:"Pensão",pix:"",parc:"",v:600,p:false},{c:"Telefonia",n:"Vivo",pix:"",parc:"",v:72,p:false},{c:"Equipamentos",n:"iPhone",pix:"",parc:"?",v:430,p:false},{c:"Equipamentos",n:"iPad",pix:"",parc:"?",v:196,p:false},{c:"Dívidas",n:"Empréstimo",pix:"",parc:"?",v:286,p:false},{c:"Negócios",n:"Consultoria",pix:"",parc:"",v:200,p:false},{c:"Dívidas",n:"Cartão de Crédito",pix:"",parc:"",v:1252,p:false},{c:"Investimento",n:"Consórcio",pix:"",parc:"?",v:338,p:false},{c:"Pessoal",n:"Roupas",pix:"",parc:"",v:107,p:false},{c:"Investimento",n:"Consórcio mãe",pix:"",parc:"?",v:137,p:false}],
    Julho:[{c:"Moradia",n:"Pensão",pix:"",parc:"",v:600,p:false},{c:"Telefonia",n:"Vivo",pix:"",parc:"",v:72,p:false},{c:"Equipamentos",n:"iPhone",pix:"",parc:"?",v:430,p:false},{c:"Equipamentos",n:"iPad",pix:"",parc:"?",v:196,p:false},{c:"Dívidas",n:"Empréstimo",pix:"",parc:"?",v:286,p:false},{c:"Negócios",n:"Consultoria",pix:"",parc:"",v:200,p:false},{c:"Investimento",n:"Consórcio",pix:"",parc:"?",v:338,p:false},{c:"Pessoal",n:"Roupas",pix:"",parc:"",v:107,p:false},{c:"Investimento",n:"Consórcio mãe",pix:"",parc:"?",v:137,p:false}],
    Agosto:[{c:"Moradia",n:"Pensão",pix:"",parc:"",v:600,p:false},{c:"Telefonia",n:"Vivo",pix:"",parc:"",v:72,p:false},{c:"Equipamentos",n:"iPhone",pix:"",parc:"?",v:430,p:false},{c:"Equipamentos",n:"iPad",pix:"",parc:"?",v:196,p:false},{c:"Dívidas",n:"Empréstimo",pix:"",parc:"?",v:286,p:false},{c:"Negócios",n:"Consultoria",pix:"",parc:"",v:200,p:false},{c:"Investimento",n:"Consórcio",pix:"",parc:"?",v:338,p:false},{c:"Pessoal",n:"Roupas",pix:"",parc:"",v:107,p:false},{c:"Investimento",n:"Consórcio mãe",pix:"",parc:"?",v:137,p:false}],
    Setembro:[{c:"Moradia",n:"Pensão",pix:"",parc:"",v:600,p:false},{c:"Telefonia",n:"Vivo",pix:"",parc:"",v:72,p:false},{c:"Equipamentos",n:"iPhone",pix:"",parc:"?",v:430,p:false},{c:"Equipamentos",n:"iPad",pix:"",parc:"?",v:196,p:false},{c:"Dívidas",n:"Empréstimo",pix:"",parc:"?",v:286,p:false},{c:"Negócios",n:"Consultoria",pix:"",parc:"",v:200,p:false},{c:"Investimento",n:"Consórcio",pix:"",parc:"?",v:338,p:false},{c:"Pessoal",n:"Roupas",pix:"",parc:"",v:107,p:false},{c:"Investimento",n:"Consórcio mãe",pix:"",parc:"?",v:137,p:false}],
    Outubro:[{c:"Moradia",n:"Pensão",pix:"",parc:"",v:600,p:false},{c:"Telefonia",n:"Vivo",pix:"",parc:"",v:72,p:false},{c:"Equipamentos",n:"iPad",pix:"",parc:"?",v:196,p:false},{c:"Dívidas",n:"Empréstimo",pix:"",parc:"?",v:286,p:false},{c:"Negócios",n:"Consultoria",pix:"",parc:"",v:200,p:false},{c:"Investimento",n:"Consórcio",pix:"",parc:"?",v:338,p:false},{c:"Pessoal",n:"Roupas",pix:"",parc:"",v:107,p:false},{c:"Investimento",n:"Consórcio mãe",pix:"",parc:"?",v:137,p:false}],
    Novembro:[{c:"Moradia",n:"Pensão",pix:"",parc:"",v:600,p:false},{c:"Telefonia",n:"Vivo",pix:"",parc:"",v:72,p:false},{c:"Equipamentos",n:"iPad",pix:"",parc:"?",v:196,p:false},{c:"Dívidas",n:"Empréstimo",pix:"",parc:"?",v:286,p:false},{c:"Negócios",n:"Consultoria",pix:"",parc:"",v:200,p:false},{c:"Investimento",n:"Consórcio",pix:"",parc:"?",v:338,p:false},{c:"Investimento",n:"Consórcio mãe",pix:"",parc:"?",v:137,p:false}],
    Dezembro:[{c:"Moradia",n:"Pensão",pix:"",parc:"",v:600,p:false},{c:"Telefonia",n:"Vivo",pix:"",parc:"",v:72,p:false},{c:"Equipamentos",n:"iPad",pix:"",parc:"?",v:196,p:false},{c:"Dívidas",n:"Empréstimo",pix:"",parc:"?",v:286,p:false},{c:"Negócios",n:"Consultoria",pix:"",parc:"",v:200,p:false},{c:"Investimento",n:"Consórcio",pix:"",parc:"?",v:338,p:false},{c:"Investimento",n:"Consórcio mãe",pix:"",parc:"?",v:137,p:false}],
  }
};
let CATS=["Moradia","Telefonia","Equipamentos","Dívidas","Pessoal","Negócios","Investimento","Outros"];
let COLORS={"Moradia":"#C9A84C","Telefonia":"#2A6BAD","Equipamentos":"#7B5EA7","Dívidas":"#C8102E","Pessoal":"#C8501A","Negócios":"#1D7A5A","Investimento":"#25A374","Outros":"#888878"};
let BGCOLORS={};
CATS.forEach(c=>{BGCOLORS[c]=(COLORS[c]||'#888')+'18';});
let mes=S.meses[0],pendingNew=null;
const fmt2=v=>Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtI=v=>Number(v).toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0});
const total=m=>(S.itens[m]||[]).reduce((s,r)=>s+Number(r.v||0),0);
const totalPago=m=>(S.itens[m]||[]).filter(r=>r.p).reduce((s,r)=>s+Number(r.v||0),0);
const sortedItens=m=>[...(S.itens[m]||[])].sort((a,b)=>CATS.indexOf(a.c)-CATS.indexOf(b.c));
function saveState(){try{localStorage.setItem('hl26',JSON.stringify({S,CATS,COLORS,BGCOLORS,mes}));}catch(e){}}
function loadState(){try{const raw=localStorage.getItem('hl26');if(!raw)return;const d=JSON.parse(raw);if(d.S){Object.assign(S.entradas,d.S.entradas||{});Object.assign(S.itens,d.S.itens||{});if(d.S.meses)S.meses=d.S.meses;}if(d.CATS){CATS.length=0;d.CATS.forEach(c=>CATS.push(c));}if(d.COLORS)Object.assign(COLORS,d.COLORS);if(d.BGCOLORS)Object.assign(BGCOLORS,d.BGCOLORS);if(d.mes&&S.meses.includes(d.mes))mes=d.mes;}catch(e){}}
function renderKPIs(){
  document.getElementById('kpiLabel').textContent=`Resumo · ${mes}`;
  const ent=S.entradas[mes]||0,sai=total(mes),sld=ent-sai,pago=totalPago(mes),falta=sai-pago;
  document.getElementById('kpiGrid').innerHTML=[{l:"Entrada",v:`R$ ${fmt2(ent)}`,cls:'gold'},{l:"Saídas",v:`R$ ${fmt2(sai)}`,cls:'neg'},{l:"Saldo",v:`R$ ${fmt2(sld)}`,cls:sld>=0?'pos':'neg'},{l:"Já pago",v:`R$ ${fmt2(pago)}`,cls:'pos'},{l:"A pagar",v:`R$ ${fmt2(falta)}`,cls:falta>0?'neg':'pos'}].map(k=>`<div class="kpi"><p class="kpi-label">${k.l}</p><p class="kpi-val ${k.cls}">${k.v}</p></div>`).join('');
}
function renderChart(){
  const canvas=document.getElementById('chart');const ctx=canvas.getContext('2d');
  const W=canvas.offsetWidth||600,H=160;canvas.width=W;canvas.height=H;ctx.clearRect(0,0,W,H);
  const ms=S.meses,n=ms.length;
  const ent=ms.map(m=>S.entradas[m]||0),sai=ms.map(m=>total(m)),sld=ms.map((_,i)=>ent[i]-sai[i]);
  const maxV=Math.max(...ent,...sai,...sld.map(Math.abs),1);
  const pad={l:12,r:12,t:16,b:28},iW=W-pad.l-pad.r,iH=H-pad.t-pad.b,bW=Math.floor(iW/n*.22),step=iW/n;
  const toY=v=>pad.t+iH-(v/maxV)*iH;
  ctx.strokeStyle='rgba(0,0,0,.06)';ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(pad.l,pad.t+iH);ctx.lineTo(W-pad.r,pad.t+iH);ctx.stroke();
  ent.forEach((v,i)=>{if(!v)return;const x=pad.l+i*step+step/2-bW-2,y=toY(v),h=pad.t+iH-y;ctx.fillStyle='rgba(29,122,90,.55)';ctx.fillRect(x,y,bW,h);});
  sai.forEach((v,i)=>{if(!v)return;const x=pad.l+i*step+step/2+2,y=toY(v),h=pad.t+iH-y;ctx.fillStyle='rgba(200,80,26,.4)';ctx.fillRect(x,y,bW,h);});
  ctx.beginPath();ctx.strokeStyle='rgba(154,122,46,.85)';ctx.lineWidth=1.5;ctx.setLineDash([3,3]);
  sld.forEach((v,i)=>{const x=pad.l+i*step+step/2,y=toY(Math.abs(v));if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);});
  ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='rgba(85,85,72,.7)';ctx.font='9px DM Sans,sans-serif';ctx.textAlign='center';
  ms.forEach((m,i)=>{ctx.fillText(m.substring(0,3),pad.l+i*step+step/2,H-6);});
  document.getElementById('chartSub').textContent=`· ${mes}`;
}
function renderTabs(){document.getElementById('tabs').innerHTML=S.meses.map(m=>`<button class="mtab${m===mes?' on':''}" onclick="setMes('${m}')">${m}</button>`).join('')+`<button class="mtab mtab-add" onclick="addMes()">+ Mês</button>`;}
function setMes(m){mes=m;pendingNew=null;saveState();renderTabs();renderKPIs();renderChart();document.getElementById('entInput').value=(S.entradas[mes]||0).toFixed(2);renderTable();renderResumo();}
function nextMes(m){const o=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];const i=o.indexOf(m);return i>=0&&i<11?o[i+1]:null;}
function addMes(){const last=S.meses[S.meses.length-1];const nm=nextMes(last)||'Novo';if(S.meses.includes(nm))return;const cp=(S.itens[last]||[]).map(r=>({c:r.c,n:r.n,pix:r.pix||'',parc:r.parc||'',v:r.v,p:false}));S.meses.push(nm);S.entradas[nm]=0;S.itens[nm]=cp;mes=nm;pendingNew=null;saveState();renderTabs();renderKPIs();renderChart();document.getElementById('entInput').value='0.00';renderTable();renderResumo();}
function updCat(si,val){const r=sortedItens(mes)[si];const o=S.itens[mes].indexOf(r);if(o<0)return;S.itens[mes][o].c=val;saveState();renderTable();renderResumo();}
function updField(o,f,v){if(o<0||o>=S.itens[mes].length)return;S.itens[mes][o][f]=v;}
function commitField(o,f,v){updField(o,f,v);saveState();if(f==='v'){renderKPIs();renderChart();renderResumo();}}
function togglePago(si){const r=sortedItens(mes)[si];const o=S.itens[mes].indexOf(r);if(o<0)return;S.itens[mes][o].p=!S.itens[mes][o].p;saveState();renderKPIs();renderTable();renderResumo();}
function delBySort(si){const r=sortedItens(mes)[si];const o=S.itens[mes].indexOf(r);if(o<0)return;S.itens[mes].splice(o,1);pendingNew=null;saveState();renderKPIs();renderTable();renderResumo();}
function addRow(){pendingNew=true;renderTable();}
function cancelNew(){pendingNew=null;renderTable();}
function confirmNew(){const c=document.getElementById('new-cat')?.value||CATS[0];const n=document.getElementById('new-nome')?.value||'';const pix=document.getElementById('new-pix')?.value||'';const parc=document.getElementById('new-parc')?.value||'';const v=parseFloat(document.getElementById('new-val')?.value)||0;S.itens[mes].push({c,n,pix,parc,v,p:false});pendingNew=null;saveState();renderKPIs();renderTable();renderResumo();}
function copyPix(btn,o){const val=S.itens[mes][o]?.pix||'';if(!val)return;function done(){btn.classList.add('ok');btn.textContent='✓';setTimeout(()=>{btn.classList.remove('ok');btn.textContent='⎘';},1500);}if(navigator.clipboard){navigator.clipboard.writeText(val).then(()=>done()).catch(()=>fallbackCopy(val,done));}else fallbackCopy(val,done);}
function fallbackCopy(t,cb){const ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');cb();}catch(e){}document.body.removeChild(ta);}
function renderTable(){
  const sorted=sortedItens(mes),tot=total(mes),pago=totalPago(mes);
  const prev=S.meses[S.meses.indexOf(mes)-1];
  let lastCat=null,html='';
  sorted.forEach((r,si)=>{
    const oi=S.itens[mes].indexOf(r);
    if(r.c!==lastCat){const col=COLORS[r.c]||'#888',bg=BGCOLORS[r.c]||'rgba(128,128,128,.08)';html+=`<tr class="cat-header"><td colspan="7" style="background:${bg}"><span class="cat-tag" style="color:${col};background:${bg};border:1px solid ${col}44">${r.c}</span></td></tr>`;lastCat=r.c;}
    const ip=r.p;let diff='';
    if(prev){const m2=(S.itens[prev]||[]).find(p=>p.n===r.n&&p.c===r.c);if(m2&&Number(m2.v)!==Number(r.v)){const d=Number(r.v)-Number(m2.v);diff=`<span style="font-size:10px;color:${d>0?'var(--laranja)':'var(--verde)'};margin-left:4px">${d>0?'+':''}${fmt2(d)}</span>`;}}
    html+=`<tr class="item-row${ip?' paid':''}"><td><select class="cat-sel" onchange="updCat(${si},this.value)">${CATS.map(c=>`<option${c===r.c?' selected':''}>${c}</option>`).join('')}</select></td><td><input class="nome" type="text" value="${(r.n||'').replace(/"/g,'&quot;')}" oninput="updField(${oi},'n',this.value)" onblur="commitField(${oi},'n',this.value)" style="${ip?'color:var(--verde)':''}"/>${diff}</td><td><div class="pix-cell"><input class="pix-inline" type="text" value="${(r.pix||'').replace(/"/g,'&quot;')}" placeholder="chave pix…" oninput="updField(${oi},'pix',this.value)" onblur="commitField(${oi},'pix',this.value)"/><button class="pix-copy-btn" onclick="copyPix(this,${oi})" title="Copiar PIX">⎘</button></div></td><td style="text-align:center"><input class="parc" type="text" value="${(r.parc||'').replace(/"/g,'&quot;')}" placeholder="—" oninput="updField(${oi},'parc',this.value)" onblur="commitField(${oi},'parc',this.value)" title="Parcelas restantes"/></td><td><input class="val" type="number" value="${r.v}" step="0.01" min="0" oninput="updField(${oi},'v',parseFloat(this.value)||0)" onblur="commitField(${oi},'v',parseFloat(this.value)||0)" style="${ip?'color:var(--verde)':''}"/></td><td style="text-align:center"><button class="paid-btn${ip?' is-paid':''}" onclick="togglePago(${si})">${ip?'✓ Pago':'Pagar'}</button></td><td><button class="del" onclick="delBySort(${si})">×</button></td></tr>`;
  });
  if(pendingNew){html+=`<tr class="new-row"><td><select id="new-cat" class="cat-sel" style="border:1px solid var(--borda)!important">${CATS.map(c=>`<option>${c}</option>`).join('')}</select></td><td><input id="new-nome" class="nome" type="text" placeholder="Nome da despesa" onkeydown="if(event.key==='Enter')confirmNew()"/></td><td><input id="new-pix" class="pix-inline" type="text" placeholder="chave pix…"/></td><td style="text-align:center"><input id="new-parc" class="parc" type="text" placeholder="—"/></td><td><input id="new-val" class="val" type="number" value="0" step="0.01" min="0" onkeydown="if(event.key==='Enter')confirmNew()"/></td><td style="text-align:center"><button class="btn" style="font-size:11px;padding:3px 8px;color:var(--verde);border-color:var(--verde)" onclick="confirmNew()">✓</button></td><td><button class="del" onclick="cancelNew()">×</button></td></tr>`;}
  const falta=tot-pago;
  html+=`<tr class="tot-row"><td colspan="3">Total saídas &nbsp;<span style="color:var(--verde);font-weight:600">R$ ${fmt2(pago)} pago</span>${falta>0?` <span style="color:var(--cinza)">· R$ ${fmt2(falta)} a pagar</span>`:''}</td><td></td><td style="text-align:right;color:var(--laranja);font-family:'DM Mono',monospace">R$ ${fmt2(tot)}</td><td colspan="2"></td></tr>`;
  document.getElementById('tbody').innerHTML=html;
}
function renderResumo(){
  const itens=S.itens[mes]||[],tot=total(mes),ent=S.entradas[mes]||0,sld=ent-tot;
  const byCat={};CATS.forEach(c=>{byCat[c]=0;});itens.forEach(r=>{byCat[r.c]=(byCat[r.c]||0)+Number(r.v||0);});
  let html='';
  CATS.map(c=>({c,v:byCat[c]||0})).filter(x=>x.v>0).forEach(({c,v})=>{const pct=tot>0?(v/tot*100):0;html+=`<div class="bar-row"><span class="bar-label">${c}</span><div class="bar-track"><div class="bar-fill" style="width:${pct.toFixed(1)}%;background:${COLORS[c]||'#888'}"></div></div><span class="bar-amt">R$ ${fmtI(v)} <span style="color:var(--bg3)">(${pct.toFixed(0)}%)</span></span></div>`;});
  const sc=sld>=0?'var(--verde)':'var(--laranja)',sb=sld>=0?'rgba(29,122,90,.1)':'rgba(200,80,26,.1)';
  html+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:12px;border-top:1px solid var(--bg3)"><span style="font-size:11px;color:var(--cinza)">Saldo de ${mes}</span><span style="font-family:'DM Mono',monospace;font-size:15px;font-weight:600;color:${sc};background:${sb};padding:5px 14px;border-radius:99px">${sld<0?'- ':''}R$ ${fmt2(Math.abs(sld))}</span></div>`;
  document.getElementById('resumo').innerHTML=html;
}
function openCatModal(){document.getElementById('catList').innerHTML=CATS.map((c,i)=>`<div class="cat-item" draggable="true" data-i="${i}" ondragstart="dragStart(event,${i})" ondragover="dragOver(event,${i})" ondrop="dropCat(event,${i})" ondragleave="dragLeave(event)"><span class="drag-handle">⠿</span><span class="cat-dot" style="background:${COLORS[c]||'#888'}"></span><input type="text" value="${c}" oninput="renameCat(${i},this.value)"/><div class="move-btns"><button class="move-btn" onclick="moveCat(${i},-1)">▲</button><button class="move-btn" onclick="moveCat(${i},1)">▼</button></div></div>`).join('');document.getElementById('catModal').style.display='flex';}
function closeCatModal(){CATS.forEach(c=>{if(!BGCOLORS[c])BGCOLORS[c]=(COLORS[c]||'#888')+'18';});document.getElementById('catModal').style.display='none';saveState();renderTable();renderResumo();}
function renameCat(i,val){const old=CATS[i];CATS[i]=val;if(COLORS[old]){COLORS[val]=COLORS[old];delete COLORS[old];}if(BGCOLORS[old]){BGCOLORS[val]=BGCOLORS[old];delete BGCOLORS[old];}S.meses.forEach(m=>{(S.itens[m]||[]).forEach(r=>{if(r.c===old)r.c=val;});});}
function moveCat(i,dir){const j=i+dir;if(j<0||j>=CATS.length)return;[CATS[i],CATS[j]]=[CATS[j],CATS[i]];openCatModal();}
function addCat(){CATS.push('Nova');COLORS['Nova']='#888878';BGCOLORS['Nova']='#88887818';openCatModal();}
let dragIdx=null;
function dragStart(e,i){dragIdx=i;e.currentTarget.classList.add('dragging');}
function dragOver(e,i){e.preventDefault();document.querySelectorAll('.cat-item').forEach(el=>el.classList.remove('drag-over'));e.currentTarget.classList.add('drag-over');}
function dragLeave(e){e.currentTarget.classList.remove('drag-over');}
function dropCat(e,i){e.preventDefault();if(dragIdx===null||dragIdx===i)return;const mv=CATS.splice(dragIdx,1)[0];CATS.splice(i,0,mv);dragIdx=null;openCatModal();}
function exportHTML(){const cd=`const S=${JSON.stringify(S)}`;let html=document.documentElement.outerHTML;html=html.replace(/const S=\{[\s\S]*?\}\s*\n\s*\};/,cd+';');html=html.replace(/let CATS=\[.*?\];/,`let CATS=${JSON.stringify(CATS)};`);html=html.replace(/let COLORS=\{.*?\};/,`let COLORS=${JSON.stringify(COLORS)};`);html=html.replace(/let BGCOLORS=\{.*?\};/,`let BGCOLORS=${JSON.stringify(BGCOLORS)};`);const blob=new Blob([html],{type:'text/html'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='FINANCEIRO_HENDRIL_2026.html';a.click();URL.revokeObjectURL(a.href);}
function handleImport(e){const file=e.target.files[0];if(!file)return;}
function boot(){loadState();renderKPIs();renderChart();renderTabs();document.getElementById('entInput').value=(S.entradas[mes]||0).toFixed(2);renderTable();renderResumo();window.addEventListener('resize',()=>{renderChart();});}
boot();
</script>
</body>
